<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCP LAN Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="online-indicator"></div>
            <h1>LAN Chat</h1>
        </header>

        <div id="setup-screen" class="setup-screen">
            <div class="glass-card">
                <h2>Join Chat</h2>
                <p>Please enter your nickname to connect.</p>
                <form id="nickname-form">
                    <input type="text" id="nickname-input" placeholder="e.g. Maverick" required autocomplete="off">
                    <button type="submit">Connect Server</button>
                </form>
            </div>
        </div>

        <div id="chat-screen" class="chat-screen hidden">
            <div class="messages-container" id="messages-container">
                <!-- Messages will be injected here -->
            </div>
            
            <form id="chat-form" class="chat-form">
                <input type="text" id="message-input" placeholder="Type your message..." autocomplete="off">
                <button type="submit">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="send-icon"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
        </div>
    </div>
    <script src="client.js"></script>
</body>
</html>
