<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meow Chat | TCP LAN</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="paw-pattern"></div>
    
    <div class="app-container">
        <header class="header">
            <div class="cat-logo">
                <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
                    <path d="M12 2C9.5 2 7.5 4 7.5 6.5C7.5 7.6 7.9 8.6 8.5 9.4C6.5 10.5 5 12.6 5 15C5 18.9 8.1 22 12 22C15.9 22 19 18.9 19 15C19 12.6 17.5 10.5 15.5 9.4C16.1 8.6 16.5 7.6 16.5 6.5C16.5 4 14.5 2 12 2ZM12 4C13.4 4 14.5 5.1 14.5 6.5C14.5 7.9 13.4 9 12 9C10.6 9 9.5 7.9 9.5 6.5C9.5 5.1 10.6 4 12 4ZM12 20C9.2 20 7 17.8 7 15C7 13.1 8.1 11.4 9.7 10.6C10.4 10.9 11.2 11 12 11C12.8 11 13.6 10.9 14.3 10.6C15.9 11.4 17 13.1 17 15C17 17.8 14.8 20 12 20Z"/><circle cx="9" cy="14" r="1"/><circle cx="15" cy="14" r="1"/><path d="M12 17C11 17 10.2 16.5 10 16H14C13.8 16.5 13 17 12 17Z"/>
                </svg>
            </div>
            <div class="header-content">
                <h1>Meow Chat</h1>
                <div class="status-badge">
                    <span class="online-dot"></span>
                    <span class="status-text">Purring Smoothly</span>
                </div>
            </div>
        </header>

        <div id="setup-screen" class="setup-screen">
            <div class="cat-card">
                <div class="card-ears"></div>
                <h2>Welcome, Human!</h2>
                <p>Please pick a nickname to join the litter.</p>
                <form id="nickname-form">
                    <div class="input-group">
                        <input type="text" id="nickname-input" placeholder="e.g. Whiskers" required autocomplete="off">
                    </div>
                    <button type="submit" class="paw-button">Connect to Server 🐾</button>
                </form>
            </div>
        </div>

        <div id="chat-screen" class="chat-screen hidden">
            <div class="messages-container" id="messages-container">
                <!-- Messages will be injected here -->
            </div>
            
            <form id="chat-form" class="chat-form">
                <div class="input-wrapper">
                    <input type="text" id="message-input" placeholder="Meow something..." autocomplete="off">
                    <button type="submit" class="send-paw">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12 2C10.9 2 10 2.9 10 4C10 5.1 10.9 6 12 6C13.1 6 14 5.1 14 4C14 2.9 13.1 2 12 2ZM6 7C4.9 7 4 7.9 4 9C4 10.1 4.9 11 6 11C7.1 11 8 10.1 8 9C8 7.9 7.1 7 6 7ZM18 7C16.9 7 16 7.9 16 9C16 10.1 16.9 11 18 11C19.1 11 20 10.1 20 9C20 7.9 19.1 7 18 7ZM12 13C9.8 13 8 14.8 8 17C8 19.2 9.8 21 12 21C14.2 21 16 19.2 16 17C16 14.8 14.2 13 12 13Z"/></svg>
                    </button>
                </div>
            </form>
        </div>
    </div>
    <script src="client.js"></script>
</body>
</html>
